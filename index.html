<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ai chat ui</title>
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./ai-chat.css" />
    <link rel="stylesheet" href="./ai-summary.css" />
  </head>
  <body>
    <div class="inner">
      <section>
        <div class="ai-summary-title">AI 핵심 요약</div>
        <div id="summary-box"></div>
      </section>

      <hr />

      <section>
        <div id="chat-box"></div>
        <form id="chat-form">
          <input
            type="text"
            id="chat-input"
            placeholder="질문을 입력하세요..."
          />
          <button type="submit">전송</button>
        </form>
      </section>
    </div>

    <!-- 마크다운 파싱 라이브러리 필수-->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="./ai-core.js"></script>
    <script src="./ai-chat.js"></script>
    <script src="./ai-summary.js"></script>
    <script>
      // 1. 챗봇 서비스 사용
      const chatService = new AIChat("#chat-box", {
        endpoint: "/api/chat",
      });

      const chatForm = document.querySelector("#chat-form");
      const chatInput = chatForm.querySelector("#chat-input");
      const chatButton = chatForm.querySelector("button");

      chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const userInput = chatInput.value.trim();
        if (!userInput) return;

        chatInput.value = "";

        await chatService.submitQuestion({
          // payload 형태는 backend API 요구사항에 맞게 작성
          payload: {
            model: "gpt-4",
            messages: [{ role: "user", content: userInput }],
            stream: true,
          },
          callbacks: {
            onStart: () => {
              console.log("질문 시작!");

              // 접근성 추가 - 질문이 시작되면 입력 필드를 비활성화하여 사용자가 중복으로 질문을 보내는 것을 방지
              chatButton.disabled = true; // 전송 버튼도 비활성화
              chatInput.disabled = true; // 질문 중에는 입력 비활성화

            },
            onComplete: () => {
              console.log("답변 완료!");

              // 접근성 추가 - 답변이 완료되면 입력 필드를 다시 활성화하여 사용자가 새로운 질문을 할 수 있도록 허용
              chatButton.disabled = false; // 전송 버튼도 활성화
              chatInput.disabled = false; // 질문 완료 후 입력 활성화
              chatInput.focus();
            },
          },
        });
      });
    </script>
    <script>
      // 2. 요약 서비스 사용 (질문형)
      const summaryService = new AISummary("#summary-box", {
        endpoint: "/api/summary",
      });

      summaryService.start({
        // payload 형태는 backend API 요구사항에 맞게 작성
        payload: {},
        callbacks: {
          onStart: () => {
            console.log("요약 시작!");
          },
          onComplete: () => {
            console.log("요약 완료!");
          },
        },
      });
    </script>
  </body>
</html>
